{% extends 'base.html' %}
{% block title %}Cadastro{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 64px); display:flex; align-items:center; justify-content:center; padding:2rem;">
  <div style="width:100%; max-width:420px;">
    <div style="text-align:center; margin-bottom:2rem;">
      <h1 style="font-size:2rem; font-weight:800;">Criar conta</h1>
      <p style="color:var(--text-muted); margin-top:0.5rem;">O primeiro usuário será administrador</p>
    </div>
    <div class="form-card" style="max-width:100%;">
      <form method="POST">
        <div class="form-group">
          <label>Nome</label>
          <input type="text" name="name" placeholder="Seu nome" required>
        </div>
        <div class="form-group">
          <label>E-mail</label>
          <input type="email" name="email" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" name="password" placeholder="Mínimo 6 caracteres" required>
        </div>
        <div class="form-group">
          <label>Confirmar senha</label>
          <input type="password" name="confirm_password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Criar conta</button>
      </form>
      <hr class="divider">
      <p style="text-align:center; font-size:0.875rem; color:var(--text-muted);">
        Já tem conta? <a href="{{ url_for('auth.login') }}" style="color:var(--accent);">Entre aqui</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
